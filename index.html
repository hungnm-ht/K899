<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K899 - Bản đồ tiến độ thi công</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',Arial,sans-serif; overflow:hidden; }
  #container { display:flex; height:100vh; }
  #map { flex:1; height:100%; }
  #sidebar { width:340px; background:#f8f9fa; border-left:2px solid #dee2e6;
             overflow-y:auto; padding:15px; }
  #toggle-panel { display:none; }

  /* ===== TỐI ƯU CHO ĐIỆN THOẠI ===== */
  @media (max-width: 768px) {
    #container { flex-direction:column; }
    #map { height:60vh; width:100%; }
    #sidebar {
      width:100%; height:40vh; border-left:none;
      border-top:2px solid #dee2e6;
      position:relative;
    }
    /* Nút kéo panel lên/xuống */
    #toggle-panel {
      display:block; position:absolute; top:-32px; left:50%;
      transform:translateX(-50%); z-index:1000;
      background:#2C3E50; color:#fff; border:none;
      padding:6px 20px; border-radius:12px 12px 0 0;
      font-size:13px; cursor:pointer; box-shadow:0 -2px 6px rgba(0,0,0,.15);
    }
    /* Khi panel thu nhỏ: chỉ hiện nút, bản đồ gần như full */
    #sidebar.collapsed { height:0; padding:0; overflow:hidden; }
    #map.expanded { height:calc(100vh - 0px); }
    .header { font-size:14px; padding:10px; }
    .stat-card { padding:10px; margin-bottom:8px; }
    /* Chạm dễ hơn trên mobile */
    .back-btn { padding:8px 16px; font-size:14px; }
  }

  /* Màn hình rất nhỏ */
  @media (max-width: 400px) {
    .header small { font-size:10px; }
    .stat-title { font-size:12px; }
  }
  .header { background:#2C3E50; color:#fff; padding:12px 15px; margin:-15px -15px 15px;
            font-size:16px; font-weight:bold; }
  .header small { display:block; font-weight:normal; font-size:11px; opacity:.8; margin-top:3px; }
  .stat-card { background:#fff; border-radius:8px; padding:12px; margin-bottom:12px;
               box-shadow:0 1px 3px rgba(0,0,0,.1); }
  .stat-title { font-size:13px; font-weight:bold; color:#2C3E50; margin-bottom:8px;
                display:flex; justify-content:space-between; }
  .progress-bar { height:18px; background:#ECF0F1; border-radius:9px; overflow:hidden; margin:4px 0; }
  .progress-fill { height:100%; background:linear-gradient(90deg,#27AE60,#2ECC71);
                   transition:width .5s; text-align:center; color:#fff; font-size:11px;
                   line-height:18px; }
  .hm-row { display:flex; justify-content:space-between; font-size:12px; padding:3px 0;
            border-bottom:1px solid #f0f0f0; }
  .hm-done { color:#27AE60; font-weight:bold; }
  .hm-pending { color:#bbb; }
  .legend { font-size:12px; }
  .legend-item { display:flex; align-items:center; margin:4px 0; }
  .legend-dot { width:14px; height:14px; border-radius:50%; margin-right:8px; border:1px solid #999; }
  #detail { display:none; }
  .detail-title { font-size:15px; font-weight:bold; color:#2C3E50; margin-bottom:8px; }
  .back-btn { background:#3498DB; color:#fff; border:none; padding:5px 12px; border-radius:5px;
              cursor:pointer; font-size:12px; margin-bottom:10px; }
  .photo-link { display:inline-block; margin:3px; padding:4px 8px; background:#ECF0F1;
                border-radius:5px; font-size:11px; text-decoration:none; color:#2C3E50; }
  .loading { text-align:center; color:#7F8C8D; padding:20px; font-size:13px; }
  .leaflet-popup-content { margin:10px; font-size:13px; }
  .popup-hm { font-size:11px; margin:2px 0; }
  /* Nhãn tên cột: nền mờ, chữ nhỏ gọn */
  .pole-label {
    background: rgba(255,255,255,0.85); border: none; box-shadow: none;
    color: #2C3E50; font-size: 10px; font-weight: bold; padding: 1px 4px;
    border-radius: 3px;
  }
  .pole-label::before { display: none; }  /* bỏ mũi tên tooltip */
  .special-marker { background: transparent; border: none; }
  /* Đổ bóng cho cột để nổi khối trên nền vệ tinh */
  .pole-dot { filter: drop-shadow(0 0 3px rgba(0,0,0,0.6)); }
  /* Nút bật/tắt nhãn cột */
  #toggle-labels {
    position: absolute; top: 10px; right: 10px; z-index: 1000;
    background: #fff; border: 1px solid #ccc; border-radius: 5px;
    padding: 6px 10px; cursor: pointer; font-size: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.2);
  }
  .labels-hidden .pole-label { display: none; }
</style>
</head>
<body>
<div id="container">
  <div id="map"><button id="toggle-labels" onclick="toggleLabels()">🏷️ Ẩn tên cột</button></div>
  <div id="sidebar">
    <button id="toggle-panel" onclick="togglePanel()">▼ Báo cáo</button>
    <div class="header">📊 TIẾN ĐỘ THI CÔNG K899
      <small>Hệ thống camera giám sát · Kho K899</small>
    </div>
    <div id="overview">
      <div class="loading">⏳ Đang tải dữ liệu tiến độ...</div>
    </div>
    <div id="detail"></div>
  </div>
</div>

let progressData = { TUYEN:{}, COT:{} };
let poleMarkers = {}, routeLines = {};

// ===== ĐỌC CSV TỪ GOOGLE SHEET =====
function parseCSV(text) {
  const rows = [];
  let row = [], cur = '', inQ = false;
  for (let i=0; i<text.length; i++) {
    const c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') inQ = false;
      else cur += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(cur); cur=''; }
      else if (c === '\n' || c === '\r') {
        if (cur !== '' || row.length) { row.push(cur); rows.push(row); row=[]; cur=''; }
        if (c === '\r' && text[i+1] === '\n') i++;
      } else cur += c;
    }
  }
  if (cur !== '' || row.length) { row.push(cur); rows.push(row); }
  return rows;
}

function isDone(val) {
  if (!val) return false;
  val = String(val).trim();
  if (val === '✅') return true;
  return /\d{1,2}\/\d{1,2}/.test(val);
}
function getDate(val) {
  const m = String(val).match(/\d{1,2}\/\d{1,2}(?:\/\d{2,4})?/);
  return m ? m[0] : '';
}

async function loadSheet(url, type) {
  if (url.startsWith('PASTE_')) return; // chưa cấu hình
  try {
    const res = await fetch(url);
    const text = await res.text();
    const rows = parseCSV(text);
    const headers = rows[0];
    for (let i=1; i<rows.length; i++) {
      const code = (rows[i][0]||'').trim().toUpperCase();
      if (code) progressData[type][code] = rows[i];
    }
  } catch(e) { console.error('Lỗi tải sheet', type, e); }
}

// ===== TÔ MÀU theo tiến độ =====
function poleColor(code) {
  const row = progressData.COT[code];
  if (!row) return '#FF1744'; // đỏ tươi - chưa có dữ liệu
  let done = 0;
  for (let i=0; i<HM_COT.length; i++) if (isDone(row[i+1])) done++;
  if (done === 0) return '#FF1744'; // đỏ - chưa làm
  if (done === HM_COT.length) return '#00E5FF'; // cyan - xong
  return '#FFD600'; // vàng chanh - đang làm
}
function routeColor(code) {
  const row = progressData.TUYEN[code];
  if (!row) return '#FF1744';
  let done = 0;
  for (let i=0; i<HM_TUYEN.length; i++) if (isDone(row[i+1])) done++;
  if (done === 0) return '#FF1744';
  if (done === HM_TUYEN.length) return '#00E5FF';
  return '#FFD600';
}

// ===== VẼ LÊN BẢN ĐỒ =====
function drawMap() {
  // Tuyến
  for (const [code, info] of Object.entries(GEO.routes)) {
    const line = L.polyline(info.coords, {
      color: routeColor(code), weight: 5, opacity: 0.9,
      dashArray: info.uncertain ? '8,6' : null
    }).addTo(map);
    line.on('click', () => showDetail(code, 'TUYEN'));
    line.bindTooltip(code, {sticky:true});
    routeLines[code] = line;
  }
  // Cột — hiện tên cố định (permanent tooltip)
  for (const [code, latlng] of Object.entries(GEO.poles)) {
    const m = L.circleMarker(latlng, {
      radius: 8, fillColor: poleColor(code), color:'#fff',
      weight: 2.5, fillOpacity: 1, className: 'pole-dot'
    }).addTo(map);
    m.on('click', () => showDetail(code, 'COT'));
    m.bindTooltip(code, {
      permanent: true, direction: 'top', className: 'pole-label', offset: [0,-6]
    });
    poleMarkers[code] = m;
  }
  // Điểm đặc biệt — icon riêng (cổng/nhà)
  const specialIcons = {
    'Cổng HC': {emoji:'🚪', label:'Cổng HC', color:'#E74C3C'},
    'Cổng KT': {emoji:'🚪', label:'Cổng KT', color:'#E67E22'},
    'P.SERVER': {emoji:'🖥️', label:'Server', color:'#2980B9'},
    'P.VẬN HÀNH': {emoji:'🏢', label:'Vận hành', color:'#8E44AD'},
  };
  for (const [name, latlng] of Object.entries(GEO.specials)) {
    const cfg = specialIcons[name] || {emoji:'📍', label:name, color:'#555'};
    const icon = L.divIcon({
      className: 'special-marker',
      html: `<div style="background:${cfg.color};border:2px solid #fff;border-radius:6px;
             padding:3px 6px;box-shadow:0 1px 4px rgba(0,0,0,.4);white-space:nowrap;
             font-size:13px;color:#fff;font-weight:bold;">${cfg.emoji} ${cfg.label}</div>`,
      iconSize: null, iconAnchor: [0, 0]
    });
    L.marker(latlng, {icon: icon}).addTo(map);
  }
}

// ===== PANEL TỔNG QUAN =====
function renderOverview() {
  let html = '';
  const config = [['TUYEN', HM_TUYEN, 'TUYẾN CÁP', Object.keys(GEO.routes).length],
                  ['COT', HM_COT, 'CỘT CAMERA', Object.keys(GEO.poles).length]];
  let grandDone=0, grandTotal=0;
  for (const [type, hmList, label, total] of config) {
    let doneItems=0, totalItems=total*hmList.length;
    const data = progressData[type];
    for (const code in data) {
      for (let i=0; i<hmList.length; i++) if (isDone(data[code][i+1])) doneItems++;
    }
    grandDone += doneItems; grandTotal += totalItems;
    const pct = totalItems ? Math.round(doneItems/totalItems*100) : 0;
    html += `<div class="stat-card">
      <div class="stat-title"><span>${label}</span><span>${pct}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%">${pct>8?pct+'%':''}</div></div>
      <div style="font-size:11px;color:#7F8C8D">${doneItems}/${totalItems} hạng mục</div>
    </div>`;
  }
  const gpct = grandTotal ? Math.round(grandDone/grandTotal*100) : 0;
  html += `<div class="stat-card" style="background:#2C3E50;color:#fff">
    <div class="stat-title"><span>🎯 TỔNG DỰ ÁN</span><span>${gpct}%</span></div>
    <div class="progress-bar"><div class="progress-fill" style="width:${gpct}%"></div></div>
  </div>`;
  // Chú thích
  html += `<div class="stat-card"><div class="stat-title">Chú thích</div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#00E5FF"></div>Hoàn thành</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FFD600"></div>Đang thi công</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FF1744"></div>Chưa làm</div>
      <div class="legend-item"><span style="border-top:2px dashed #888;width:20px;margin-right:8px"></span>Tuyến cần kiểm tra vị trí</div>
    </div></div>`;
  document.getElementById('overview').innerHTML = html;
}

// ===== CHI TIẾT ĐỐI TƯỢNG =====
function showDetail(code, type) {
  const hmList = type==='TUYEN' ? HM_TUYEN : HM_COT;
  const row = progressData[type][code];
  let html = `<button class="back-btn" onclick="hideDetail()">← Quay lại</button>`;
  html += `<div class="detail-title">${type==='TUYEN'?'🛣':'🗼'} ${code}</div>`;
  if (!row) {
    html += `<div class="loading">Chưa có dữ liệu tiến độ cho đối tượng này.</div>`;
  } else {
    let done=0;
    html += `<div class="stat-card"><div class="stat-title">Hạng mục</div>`;
    for (let i=0; i<hmList.length; i++) {
      const val = row[i+1];
      if (isDone(val)) {
        done++;
        html += `<div class="hm-row"><span class="hm-done">✓ ${hmList[i]}</span><span>${getDate(val)}</span></div>`;
      } else {
        html += `<div class="hm-row"><span class="hm-pending">○ ${hmList[i]}</span><span></span></div>`;
      }
    }
    const pct = Math.round(done/hmList.length*100);
    html += `</div><div class="stat-card">
      <div class="stat-title"><span>Tiến độ</span><span>${pct}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%">${pct}%</div></div></div>`;
    // Ghi chú (cột cuối)
    const note = row[row.length-1];
    if (note && note.trim()) {
      html += `<div class="stat-card"><div class="stat-title">Ghi chú</div>
               <div style="font-size:12px;color:#555">${note}</div></div>`;
    }
    // Ảnh: link tới folder Drive (mở Drive tìm theo mã)
    html += `<div class="stat-card"><div class="stat-title">📷 Hình ảnh</div>
      <div style="font-size:12px;color:#7F8C8D">Ảnh hiện trường lưu trong Drive, thư mục <b>${code}</b>.</div>
      </div>`;
  }
  document.getElementById('overview').style.display='none';
  document.getElementById('detail').style.display='block';
  document.getElementById('detail').innerHTML = html;
}
function hideDetail() {
  document.getElementById('detail').style.display='none';
  document.getElementById('overview').style.display='block';
}

// ===== KHỞI ĐỘNG =====
// Bật/tắt nhãn tên cột
let labelsVisible = true;
function toggleLabels() {
  labelsVisible = !labelsVisible;
  const mp = document.getElementById('map');
  const btn = document.getElementById('toggle-labels');
  if (labelsVisible) {
    mp.classList.remove('labels-hidden');
    btn.textContent = '🏷️ Ẩn tên cột';
  } else {
    mp.classList.add('labels-hidden');
    btn.textContent = '🏷️ Hiện tên cột';
  }
}
// Tự ẩn nhãn khi zoom xa (tránh rối), tự hiện khi zoom gần
map.on('zoomend', () => {
  const z = map.getZoom();
  const mp = document.getElementById('map');
  if (z < 15 && labelsVisible) {
    mp.classList.add('labels-hidden');
  } else if (z >= 15 && labelsVisible) {
    mp.classList.remove('labels-hidden');
  }
});

// Thu/phóng panel trên điện thoại
let panelCollapsed = false;
function togglePanel() {
  const sb = document.getElementById('sidebar');
  const mp = document.getElementById('map');
  const btn = document.getElementById('toggle-panel');
  panelCollapsed = !panelCollapsed;
  if (panelCollapsed) {
    sb.classList.add('collapsed');
    mp.classList.add('expanded');
    btn.textContent = '▲ Báo cáo';
  } else {
    sb.classList.remove('collapsed');
    mp.classList.remove('expanded');
    btn.textContent = '▼ Báo cáo';
  }
  setTimeout(() => map.invalidateSize(), 300);
}

async function init() {
  await Promise.all([
    loadSheet(SHEET_CSV_TUYEN, 'TUYEN'),
    loadSheet(SHEET_CSV_COT, 'COT')
  ]);
  drawMap();
  renderOverview();
}
init();
</script>
